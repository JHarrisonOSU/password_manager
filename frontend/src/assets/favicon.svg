<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DA6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shackleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BB8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E7FD8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shackle (top arc of padlock) -->
  <path d="M10 15 L10 10 Q10 4 16 4 Q22 4 22 10 L22 15" 
        fill="none" 
        stroke="url(#shackleGrad)" 
        stroke-width="3.2" 
        stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="7" y="14" width="18" height="14" rx="3" ry="3" fill="url(#lockGrad)"/>

  <!-- Keyhole circle -->
  <circle cx="16" cy="20" r="2.8" fill="#0D3A6E"/>

  <!-- Keyhole stem -->
  <rect x="14.8" y="21.5" width="2.4" height="3.5" rx="1" fill="#0D3A6E"/>
</svg>
